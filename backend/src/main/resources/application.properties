# ====================== SERVER CONFIGURATION ======================
server.port=8080
server.servlet.context-path=/

# ====================== APPLICATION INFO ======================
spring.application.name=allweather-backend
app.name=All Weather Solution
app.business.phone=+91 96613 32544
app.business.location=Buxar, Bihar, India

# ====================== MYSQL DATABASE CONFIGURATION ======================
spring.datasource.url=jdbc:mysql://localhost:3306/allweather_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=allweather_user
spring.datasource.password=AllWeather@2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ====================== JPA / HIBERNATE CONFIGURATION ======================
# Use 'create-drop' for dev (drops and recreates schema on restart)
# Change to 'update' for production to preserve data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# ====================== JACKSON / JSON ======================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ====================== ACTUATOR ======================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=${spring.application.name}
management.info.app.description=AC Repair Service Backend API

# ====================== LOGGING ======================
logging.level.com.allweather=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ====================== CORS (also handled in CorsConfig.java) ======================
# Frontend origin - adjust if frontend is served from a different port
app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8081,file://